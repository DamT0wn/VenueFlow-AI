version: "3.9"

services:
  # ──────────────────────────────────────────────────────────
  # Redis — Crowd density & queue caching
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: venueflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # Firebase Emulator Suite
  # ──────────────────────────────────────────────────────────
  firebase-emulator:
    image: andreysenov/firebase-tools:latest
    container_name: venueflow-firebase-emulator
    working_dir: /home/node
    command: >
      firebase emulators:start
      --only auth,firestore,storage,pubsub
      --project demo-venueflow
      --import=/home/node/.firebase-data
      --export-on-exit
    ports:
      - "4000:4000"   # Emulator UI
      - "9099:9099"   # Auth emulator
      - "8080:8080"   # Firestore emulator
      - "9199:9199"   # Storage emulator
      - "8085:8085"   # Pub/Sub emulator
    volumes:
      - firebase_data:/home/node/.firebase-data
      - ./firestore.rules:/home/node/firestore.rules
      - ./firestore.indexes.json:/home/node/firestore.indexes.json
      - ./firebase.json:/home/node/firebase.json
    environment:
      FIREBASE_TOKEN: "fake-token-for-emulator"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # NOTE: The API runs natively via `npm run dev` (Turborepo).
  # Docker build is skipped because the Dockerfile needs the monorepo root
  # (turbo.json, package-lock.json) which is outside the build context.

volumes:
  redis_data:
  firebase_data:
