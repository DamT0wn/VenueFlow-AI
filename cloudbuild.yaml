# ══════════════════════════════════════════════════════════════════════════════
# VenueFlow AI — Google Cloud Build CI/CD Pipeline
#
# Triggered on push to main branch.
# Builds and deploys both services to Cloud Run in parallel.
#
# Required substitution variables (set in Cloud Build trigger):
#   _REGION              e.g. asia-south1
#   _PROJECT_ID          your GCP project ID
#   _REDIS_URL           redis://10.x.x.x:6379  (Cloud Memorystore private IP)
#   _FIREBASE_PROJECT_ID your Firebase project ID
#   _CORS_ORIGINS        https://venueflow-web-xxxx-as.a.run.app
#   _MAPS_API_KEY        your Google Maps API key
#   _FIREBASE_API_KEY    your Firebase web API key
#   _FIREBASE_AUTH_DOMAIN
#   _FIREBASE_STORAGE_BUCKET
#   _FIREBASE_MESSAGING_SENDER_ID
#   _FIREBASE_APP_ID
#   _GA_MEASUREMENT_ID   G-XXXXXXXXXX (optional)
# ══════════════════════════════════════════════════════════════════════════════

substitutions:
  _REGION: asia-south1
  _API_SERVICE: venueflow-api
  _WEB_SERVICE: venueflow-web
  _GA_MEASUREMENT_ID: ''

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ── 1. Run API unit tests ───────────────────────────────────────────────────
  - name: node:20-alpine
    id: test-api
    entrypoint: sh
    args:
      - -c
      - |
        npm ci --workspace=apps/api --workspace=packages/shared-types --workspace=packages/venue-data
        cd apps/api && npx jest --no-coverage --testPathPattern="__tests__"
    waitFor: ['-']

  # ── 2. Build API Docker image ───────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-api
    args:
      - build
      - -f
      - apps/api/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/venueflow/${_API_SERVICE}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/venueflow/${_API_SERVICE}:latest
      - .
    waitFor: [test-api]

  # ── 3. Build Web Docker image ───────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-web
    args:
      - build
      - -f
      - apps/web/Dockerfile
      - --build-arg
      - NEXT_PUBLIC_API_URL=https://${_API_SERVICE}-${_REGION}-${PROJECT_ID}.a.run.app
      - --build-arg
      - NEXT_PUBLIC_SOCKET_URL=https://${_API_SERVICE}-${_REGION}-${PROJECT_ID}.a.run.app
      - --build-arg
      - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${_MAPS_API_KEY}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_FIREBASE_STORAGE_BUCKET}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_FIREBASE_MESSAGING_SENDER_ID}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_APP_ID=${_FIREBASE_APP_ID}
      - --build-arg
      - NEXT_PUBLIC_GA_MEASUREMENT_ID=${_GA_MEASUREMENT_ID}
      - --build-arg
      - NEXT_PUBLIC_USE_EMULATOR=false
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/venueflow/${_WEB_SERVICE}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/venueflow/${_WEB_SERVICE}:latest
      - .
    waitFor: ['-']

  # ── 4. Push images ──────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-api
    args: [push, --all-tags, '${_REGION}-docker.pkg.dev/${PROJECT_ID}/venueflow/${_API_SERVICE}']
    waitFor: [build-api]

  - name: gcr.io/cloud-builders/docker
    id: push-web
    args: [push, --all-tags, '${_REGION}-docker.pkg.dev/${PROJECT_ID}/venueflow/${_WEB_SERVICE}']
    waitFor: [build-web]

  # ── 5. Deploy API to Cloud Run ──────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy-api
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_API_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/venueflow/${_API_SERVICE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --concurrency=80
      - --timeout=60
      - --set-env-vars=NODE_ENV=production,FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID},PUBSUB_PROJECT_ID=${_FIREBASE_PROJECT_ID},CORS_ORIGINS=${_CORS_ORIGINS}
      - --set-secrets=REDIS_URL=venueflow-redis-url:latest
    waitFor: [push-api]

  # ── 6. Deploy Web to Cloud Run ──────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy-web
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_WEB_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/venueflow/${_WEB_SERVICE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --concurrency=80
      - --timeout=60
    waitFor: [push-web]

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/venueflow/${_API_SERVICE}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/venueflow/${_WEB_SERVICE}:${SHORT_SHA}
